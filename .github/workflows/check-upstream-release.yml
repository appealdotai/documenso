name: Check Documenso Upstream Release

on:
  schedule:
    - cron: '0 9 * * *' # runs daily at 09:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest upstream release
        id: upstream
        run: |
          response=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/documenso/documenso/releases/latest)
          tag=$(echo "$response" | jq -r '.tag_name')
          url=$(echo "$response" | jq -r '.html_url')
          name=$(echo "$response" | jq -r '.name')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Check if an issue for this release already exists
        id: check
        if: steps.upstream.outputs.tag != '' && steps.upstream.outputs.tag != 'null'
        run: |
          existing=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/search/issues?q=repo:${{ github.repository }}+in:title+${{ steps.upstream.outputs.tag }}+type:issue")
          count=$(echo "$existing" | jq -r '.total_count')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Create issue for new release
        if: steps.check.outputs.count == '0'
        run: |
          jq -n \
            --arg title "Upstream release ${{ steps.upstream.outputs.tag }} available" \
            --arg body "Documenso published a new release: **${{ steps.upstream.outputs.name }}**

          Release notes: ${{ steps.upstream.outputs.url }}

          Consider syncing your fork with upstream." \
            '{title: $title, body: $body}' | \
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d @-
