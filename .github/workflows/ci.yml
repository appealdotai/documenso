name: 'Continuous Integration'

on:
  workflow_call:
  push:
    branches: ['main', 'development']
  pull_request:
    branches: ['main', 'development']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/node-install

      - name: Copy env
        run: cp .env.example .env

      - name: Type check
        run: npm run typecheck -w @documenso/remix

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/node-install

      - name: Lint
        run: npm run lint

  unit_tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/node-install

      - name: Copy env
        run: cp .env.example .env

      - name: Run unit tests
        run: npm run test -w @documenso/lib

  build_app:
    name: Build App
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: ./.github/actions/node-install

      - name: Copy env
        run: cp .env.example .env

      - name: Build app
        run: npm run build

  build_docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          push: false
          context: .
          file: ./docker/Dockerfile
          tags: documenso-${{ github.sha }}

  deploy_gate:
    name: Deploy gate
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit_tests, build_app, build_docker]
    if: contains(fromJSON('["refs/heads/main", "refs/heads/development"]'), github.ref) && github.event_name == 'push'
    steps:
      - name: All checks passed
        run: echo "All checks passed. Railway deploy is unblocked."
